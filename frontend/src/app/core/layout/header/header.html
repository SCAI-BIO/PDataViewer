<mat-toolbar class="banner">
  <div class="logo-box">
    <a [routerLink]="['/']" aria-label="Go to homepage">
      <img class="logo" src="logos/logo_white.svg" alt="PDataViewer Logo" />
    </a>
  </div>

  <span class="site-title">PDataViewer</span>

  <nav class="routing-menu" aria-label="Main navigation">
    <a mat-button [routerLink]="'/cohorts'" routerLinkActive="nav-active">Cohorts</a>
    <a mat-button [routerLink]="'/biomarkers'" routerLinkActive="nav-active">Biomarkers</a>
    <a mat-button [routerLink]="'/study-picker'" routerLinkActive="nav-active">Study Picker</a>
    <a mat-button [routerLink]="'/mappings'" routerLinkActive="nav-active">Mappings</a>
    <a mat-button [routerLink]="'/longitudinal'" routerLinkActive="nav-active">Longitudinal</a>
    <a mat-button [routerLink]="'/contact-us'" routerLinkActive="nav-active">Contact Us</a>
  </nav>

  <div class="spacer"></div>

  <a
    mat-icon-button
    href="https://github.com/SCAI-BIO/PDataViewer"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="View project on GitHub"
    class="github-button"
  >
    <img src="social-media/github-mark-white.svg" alt="" class="github-logo" />
  </a>
</mat-toolbar>
